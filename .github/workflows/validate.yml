name: Validate schemas

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-schemas:
    name: ajv validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ajv-cli
        run: npm install --no-save ajv-cli@5.0.0 ajv-formats@3.0.1

      - name: Compile tool schema
        run: |
          npx --no-install ajv compile \
            --spec=draft2020 \
            -c ajv-formats \
            -s schema/tool.schema.json

      - name: Compile version schema
        run: |
          npx --no-install ajv compile \
            --spec=draft2020 \
            -c ajv-formats \
            -s schema/version.schema.json

      - name: Validate sample-tool index against tool schema
        run: |
          npx --no-install ajv validate \
            --spec=draft2020 \
            -c ajv-formats \
            -s schema/tool.schema.json \
            -d fixtures/sample-tool/index.json

      - name: Validate sample-tool versions against version schema
        run: |
          npx --no-install ajv validate \
            --spec=draft2020 \
            -c ajv-formats \
            -s schema/version.schema.json \
            -d "fixtures/sample-tool/versions/*.json"

      - name: Validate rust tool index against tool schema
        run: |
          npx --no-install ajv validate \
            --spec=draft2020 \
            -c ajv-formats \
            -s schema/tool.schema.json \
            -d tools/rust/index.json

      - name: Validate system_package tool indexes against tool schema
        run: |
          npx --no-install ajv validate \
            --spec=draft2020 \
            -c ajv-formats \
            -s schema/tool.schema.json \
            -d "tools/gcc/index.json" \
            -d "tools/libc_dev/index.json" \
            -d "tools/musl_dev/index.json" \
            -d "tools/ca_certificates/index.json" \
            -d "tools/gnupg/index.json"

      - name: Validate rust version files against version schema
        run: |
          npx --no-install ajv validate \
            --spec=draft2020 \
            -c ajv-formats \
            -s schema/version.schema.json \
            -d "tools/rust/versions/*.json"

      - name: Validate tier example fixtures against version schema
        run: |
          npx --no-install ajv validate \
            --spec=draft2020 \
            -c ajv-formats \
            -s schema/version.schema.json \
            -d "fixtures/tier*-example.json"

      - name: Cross-reference + comparator-placeholder check
        run: node scripts/validate-cross-refs.mjs

      - name: Negative test — broken fixtures must each fail validation
        run: |
          set -e
          for fixture in fixtures/_negative/*.json; do
            ajv_rc=0
            xref_rc=0
            set +e
            npx --no-install ajv validate \
              --spec=draft2020 \
              -c ajv-formats \
              -s schema/version.schema.json \
              -d "$fixture"
            ajv_rc=$?
            node scripts/validate-cross-refs.mjs --only "$fixture"
            xref_rc=$?
            set -e
            if [ "$ajv_rc" -eq 0 ] && [ "$xref_rc" -eq 0 ]; then
              echo "::error::Negative fixture $fixture passed both ajv AND cross-ref — schema/script is too permissive"
              exit 1
            fi
            echo "Negative fixture $fixture correctly rejected (ajv=$ajv_rc, xref=$xref_rc)"
          done
